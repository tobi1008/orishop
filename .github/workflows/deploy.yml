name: Deploy to K3s VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          tobi1008/orishop:latest
          tobi1008/orishop:v${{ github.run_number }}

    - name: Copy k8s config to VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_KEY }}
        port: 2210
        source: "orishop-k8s.yaml"
        target: "~/orishop-deploy"

    - name: Deploy on K3s VPS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_KEY }}
        port: 2210
        script: |
          # Di chuyển vào thư mục deploy
          mkdir -p ~/orishop-deploy
          cd ~/orishop-deploy
          
          # Áp dụng cấu hình k8s (Dùng sudo đề phòng user không có quyền đọc k3s.yaml)
          sudo kubectl apply -f orishop-k8s.yaml
          
          # Restart deployment để cập nhật Image mới
          sudo kubectl rollout restart deployment/orishop-deployment
