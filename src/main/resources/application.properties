# CẤU HÌNH MỚI (Trỏ lên AWS RDS)
# ==========================================
# Gọi biến môi trường từ Kubernetes truyền vào
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/orishop?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:03051008}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# (Tùy chọn) Không để Hibernate tự động can thiệp sửa cấu trúc bảng trên RDS
spring.jpa.hibernate.ddl-auto=none

# JPA / HIBERNATE
# spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# THYMELEAF
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# SERVER
server.port=8091
server.error.include-message=always
server.forward-headers-strategy=framework

# SESSION (Lưu session và DB để đồng bộ nhiều Pod)
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

# MAIL (GMAIL SMTP) - Cần tạo App Password nếu dùng Gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# APP CUSTOM
app.jwtSecret=orishopSecretKeyExample123456789
app.jwtExpirationMs=86400000

# MULTIPART UPLOAD
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

